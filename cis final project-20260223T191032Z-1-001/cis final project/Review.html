<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Page UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<style>
    /* Your original styles */
    .title {
        font-family: 'Luckiest Guy';
        font-size: 50px;
        color: yellow;
        text-shadow: 4px 4px black;
        display: inline-block;
    }

    .sub-title {
        font-family: 'Luckiest Guy';
        font-size: 40px;
        color: yellow;
        text-shadow: 4px 4px black;
    }

    /* Layout & System Styles */
    :root {
        --bg-green: #1a4d2e;
        --card-pink: #fce4ec;
        --star-yellow: #ffcc29;
    }

    body {
        background-color: var(--bg-green);
        font-family: 'Luckiest Guy', sans-serif;
        padding: 20px;
    }

    .main-container { max-width: 1000px; margin: 0 auto; }

    .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .review-box {
        background: var(--card-pink);
        border: 4px solid black;
        border-radius: 20px;
        padding: 20px;
        position: relative;
    }

    .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar-circle { width: 50px; height: 50px; border: 3px solid black; border-radius: 50%; background: white; }
    
    /* INTERACTIVE STAR CSS */
    .mini-stars {
        display: flex;
        cursor: pointer;
        font-size: 30px;
    }

    .clickable-star {
        color: white; /* Default empty state */
        -webkit-text-stroke: 1px black;
        transition: transform 0.1s;
    }

    /* This class is added via JavaScript when clicked */
    .clickable-star.is-active {
        color: var(--star-yellow);
    }

    .clickable-star:hover {
        transform: scale(1.2);
    }

    textarea {
        width: 100%;
        height: 150px;
        background: transparent;
        border: none;
        font-family: inherit;
        font-size: 1.2rem;
        outline: none;
        resize: none;
    }

    .scroll-section { height: 400px; overflow-y: auto; }
    .review-item { border-bottom: 2px solid rgba(0,0,0,0.1); padding: 10px 0; }
    .item-stars { color: white; -webkit-text-stroke: 1px black; }
    .item-stars.gold { color: var(--star-yellow); }

</style>
<body>
    <div class="main-container">
        <header>
            <h1 class="title">REVIEW</h1>
            <h2 class="sub-title">AVERAGE SCORE</h2>
            <div class="big-stars">
                <span style="color:yellow; font-size: 50px; -webkit-text-stroke: 2px black;">★ ★ ★</span>
                <span style="color:white; font-size: 50px; -webkit-text-stroke: 2px black;">★ ★</span>
            </div>
        </header>

        <main class="content-grid">
            <section class="review-box input-section">
                <div class="user-header">
                    <div class="avatar-circle"></div>
                    <span class="user-name">REVIEW A SITE</span>
                    <div class="rating-input">
                        <small>RATING</small>
                        <div class="mini-stars" id="interactive-rating">
                            <span class="clickable-star" data-value="1">★</span>
                            <span class="clickable-star" data-value="2">★</span>
                            <span class="clickable-star" data-value="3">★</span>
                            <span class="clickable-star" data-value="4">★</span>
                            <span class="clickable-star" data-value="5">★</span>
                        </div>
                    </div>
                </div>
                <textarea placeholder="WRITE YOUR REVIEW..."></textarea>
                <div class="vine-decoration">🌿</div>
            </section>

            <section class="review-box scroll-section">
                <div class="review-list">
                    <div class="review-item">
                        <div class="item-header">
                            <div class="avatar-circle small"></div>
                            <span class="reviewer-name">BARRETTSHO67</span>
                            <span class="item-stars">★☆☆☆☆</span>
                        </div>
                        <p class="review-text">I RUINED MY TRIP</p>
                    </div>
                    
                    <div class="review-item">
                        <div class="item-header">
                            <div class="avatar-circle small"></div>
                            <span class="reviewer-name">SOFIA DE PAZ</span>
                            <span class="item-stars">★☆☆☆☆</span>
                        </div>
                        <p class="review-text">THE TRIP IS BAD</p>
                    </div>

                    <div class="review-item">
                        <div class="item-header">
                            <div class="avatar-circle small"></div>
                            <span class="reviewer-name">EDWARDO COCOM</span>
                            <span class="item-stars gold">★★★★★</span>
                        </div>
                        <p class="review-text">NO CHIHUAHUA IN SIGHT!!!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const stars = document.querySelectorAll('.clickable-star');
        
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                // Clear all stars first
                stars.forEach(s => s.classList.remove('is-active'));
                
                // Add 'is-active' class to the clicked star and all previous siblings
                for (let i = 0; i <= index; i++) {
                    stars[i].classList.add('is-active');
                }
                
                console.log("Rated:", index + 1);
            });
        });
    </script>
</body>
</html>
