<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body { background: #1a4d2e; font-family: 'Luckiest Guy'; color: #ffff00; padding: 40px; }
        h1 { font-size: 50px; text-shadow: 4px 4px black; text-align: center; }
        h2 { border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 5px; margin-top: 40px; }

        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 20px; }
        .input-item { display: flex; flex-direction: column; gap: 10px; }
        input { 
            background: rgba(0,0,0,0.3); border: 3px solid #fbc02d; 
            border-radius: 20px; padding: 12px; color: #ffff00; 
            font-family: inherit; font-size: 18px;
        }

        .user-manager { display: flex; gap: 40px; margin-top: 30px; overflow-x: auto; padding-bottom: 20px; }
        .user-card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .avatar { width: 100px; height: 100px; background: #cbd5e0; border-radius: 50%; }
        .edit-btn { 
            background: #fbc02d; color: #1a4d2e; border: none; padding: 10px 20px; 
            border-radius: 10px; font-family: inherit; cursor: pointer; font-size: 18px;
            box-shadow: 0 4px 0 #b8860b;
        }
        .edit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b8860b; }
    </style>
</head>
<body>
    <a href="#" style="font-size: 40px; color: orange; text-decoration: none;">←</a>
    <h1>ADMIN DASHBOARD</h1>

    <h2>CREATE ATTRACTION</h2>
    <div class="form-grid">
        <div class="input-item">
            <label>Attraction name:</label><input type="text" placeholder="Enter..">
        </div>
        <div class="input-item">
            <label>Attraction Type:</label><input type="text" placeholder="Enter..">
            <label>Attraction Price:</label><input type="text" placeholder="Enter..">
        </div>
        <div class="input-item">
            <label>Attraction Description:</label><input type="text" placeholder="Enter..">
        </div>
    </div>

    <h2>USER MANAGER</h2>
    <div class="user-manager">
        <div class="user-card">
            <div class="avatar"></div>
            <span>Name</span>
            <button class="edit-btn">EDIT</button>
        </div>
        <div class="user-card">
            <div class="avatar"></div>
            <span>Name</span>
            <button class="edit-btn">EDIT</button>
        </div>
        <div class="user-card">
            <div class="avatar"></div>
            <span>Name</span>
            <button class="edit-btn">EDIT</button>
        </div>
        <div class="user-card">
            <div class="avatar"></div>
            <span>Name</span>
            <button class="edit-btn">EDIT</button>
        </div>
    </div>
</body>
</html>
