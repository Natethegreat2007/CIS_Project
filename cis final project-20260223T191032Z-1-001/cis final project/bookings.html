<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-green: #1a4d2e;
            --accent-yellow: #ffff00;
            --border-gold: #fbc02d;
            --cell-available: #4e6a41;
            --cell-unavailable: #7e8c9c;
            --cell-selected: #fbc02d;
        }

        body {
            background-color: var(--bg-green);
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 40px;
            font-family: 'Luckiest Guy', cursive;
            margin: 0;
            padding: 20px;
            color: var(--accent-yellow);
        }

        /* Navbar Header */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .logo { font-size: 40px; text-shadow: 3px 3px black; }
        .search-box {
            background: white; border-radius: 50px; border: 3px solid black;
            padding: 5px 15px; display: flex; align-items: center;
        }
        .search-box input { border: none; outline: none; font-family: inherit; }

        /* Main Booking Grid */
        .booking-container {
            border: 4px solid var(--border-gold);
            border-radius: 20px;
            padding: 25px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            background: rgba(0,0,0,0.2);
        }

        h2 { font-size: 32px; margin-top: 0; text-shadow: 2px 2px black; }

        /* CALENDAR STYLES */
        .calendar-box {
            border: 3px solid var(--border-gold);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }

        .cal-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); padding: 10px;
            border-bottom: 3px solid var(--border-gold);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .day-label { background: rgba(251, 192, 45, 0.2); padding: 10px 0; border-bottom: 2px solid var(--border-gold); }
        
        .date-cell {
            padding: 15px 0;
            border: 0.5px solid rgba(251, 192, 45, 0.2);
            cursor: pointer;
            transition: 0.2s;
        }

        .available { background-color: var(--cell-available); color: #cddc39; }
        .unavailable { background-color: var(--cell-unavailable); color: #555; cursor: not-allowed; }
        .selected { background-color: var(--cell-selected) !important; color: black !important; }

        .legend { display: flex; gap: 20px; margin-top: 15px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid white; }

        /* RIGHT PANEL STYLES */
        .details-panel { display: flex; flex-direction: column; gap: 25px; }
        
        .form-group { position: relative; }
        .custom-select {
            width: 100%; padding: 12px;
            background: transparent; border: 3px solid var(--border-gold);
            border-radius: 15px; color: var(--accent-yellow);
            font-family: 'Luckiest Guy'; font-size: 18px; outline: none;
        }

        .availability-card {
            border: 3px solid var(--border-gold);
            border-radius: 15px; padding: 15px;
            text-align: center; background: rgba(0,0,0,0.2);
        }

        .book-now-btn {
            background-color: #cddc39;
            color: #1a4d2e;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-family: 'Luckiest Guy';
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 0 #689f38;
            transition: 0.1s;
        }
        .book-now-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #689f38; }

        .payment-methods {
            border: 2px solid #4e6a41; border-radius: 15px;
            padding: 15px; text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BOOKING <span style="font-size: 18px; color: #cddc39;">MYBOOKING</span></div>
        <div class="search-box">
            <input type="text" placeholder="Search">
            <span>🔍</span>
        </div>
    </nav>

    <h2>Select tour date:</h2>
    
    <div class="booking-container">
        <div class="left-col">
            <div class="calendar-box">
                <div class="cal-header">
                    <span>◀</span>
                    <span>February 2026</span>
                    <span>▶</span>
                </div>
                <div class="calendar-grid">
                    <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
                    
                    <div class="date-cell available">1</div><div class="date-cell available">2</div><div class="date-cell available">3</div><div class="date-cell available">4</div><div class="date-cell available">5</div><div class="date-cell available">6</div><div class="date-cell available">7</div>
                    <div class="date-cell available">8</div><div class="date-cell available">9</div><div class="date-cell available">10</div><div class="date-cell unavailable">11</div><div class="date-cell unavailable">12</div><div class="date-cell unavailable">13</div><div class="date-cell unavailable">14</div>
                    <div class="date-cell available">15</div><div class="date-cell available selected">16</div><div class="date-cell available">17</div><div class="date-cell unavailable">18</div><div class="date-cell unavailable">19</div><div class="date-cell available">20</div><div class="date-cell available">21</div>
                    <div class="date-cell available">22</div><div class="date-cell unavailable">23</div><div class="date-cell available">24</div><div class="date-cell available">25</div><div class="date-cell available">26</div><div class="date-cell available">27</div><div class="date-cell available">28</div>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="box" style="background: var(--cell-available)"></div> Available</div>
                <div class="legend-item"><div class="box" style="background: var(--cell-unavailable)"></div> Unavailable</div>
            </div>
        </div>

        <div class="details-panel">
            <div class="form-group">
                <label>Number of persons</label>
                <select class="custom-select" id="personCount">
                    <option>1 person</option>
                    <option>2 persons</option>
                    <option>3 persons</option>
                    <option>4+ persons</option>
                </select>
            </div>

            <div class="availability-card">
                <div style="color: #cddc39; font-size: 20px;">12 spots left</div>
                <div style="font-size: 24px;">Total price: $100</div>
            </div>

            <button class="book-now-btn">BOOK NOW</button>

            <div class="payment-methods">
                <div style="font-size: 14px; margin-bottom: 10px; color: #cddc39;">Accepted Payment Methods</div>
                <div style="font-size: 20px; letter-spacing: 5px;">
                    <span style="color: #1a1aff;">VISA</span>
                    <span style="color: #00aaff;">AMEX</span>
                    <span style="color: #ff3300;">MC</span>
                    <span style="color: #0044ff;">PayPal</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Select Date Logic
        const dateCells = document.querySelectorAll('.date-cell.available');
        dateCells.forEach(cell => {
            cell.addEventListener('click', () => {
                dateCells.forEach(c => c.classList.remove('selected'));
                cell.classList.add('selected');
            });
        });

        // Simple price calculation logic
        const personSelect = document.getElementById('personCount');
        personSelect.addEventListener('change', (e) => {
            const count = parseInt(e.target.value
