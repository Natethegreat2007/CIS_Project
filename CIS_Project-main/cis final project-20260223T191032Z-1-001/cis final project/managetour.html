<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tour - Jungle UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-green: #1a4d2e;
            --accent-yellow: #ffff00;
            --input-bg: rgba(0, 0, 0, 0.4);
            --border-gold: #fbc02d;
        }

        body {
            background-color: var(--bg-green);
            background-image: linear-gradient(90deg, rgba(255,255,255,0.03) 50%, transparent 50%);
            background-size: 40px 100%;
            font-family: 'Luckiest Guy', cursive;
            margin: 0;
            padding: 40px;
            color: var(--accent-yellow);
        }

        /* Back Arrow */
        .back-nav {
            font-size: 50px;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .back-nav:hover { transform: translateX(-10px); }

        .page-header {
            font-size: 50px;
            text-shadow: 4px 4px black;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        .sub-header {
            font-size: 30px;
            border-bottom: 2px solid var(--accent-yellow);
            display: inline-block;
            margin-bottom: 40px;
            padding-bottom: 5px;
        }

        /* Form Layout */
        .manage-container {
            display: grid;
            grid-template-columns: 1fr 1fr 0.8fr;
            gap: 40px;
            align-items: start;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 3px solid var(--border-gold);
            border-radius: 20px;
            padding: 12px 20px;
            color: var(--accent-yellow);
            font-family: 'Luckiest Guy';
            font-size: 20px;
            outline: none;
            box-sizing: border-box;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 0, 0.5);
        }

        /* Upload Section */
        .upload-section {
            text-align: center;
            border-left: 2px solid rgba(251, 192, 45, 0.3);
            padding-left: 40px;
        }

        .upload-title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .upload-box {
            width: 250px;
            height: 250px;
            background: black;
            border: 3px solid var(--border-gold);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.3s;
        }

        .upload-box:hover {
            background: #111;
        }

        .camera-icon {
            width: 80px;
            height: 80px;
            border: 4px solid var(--accent-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        #imagePreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

    </style>
</head>
<body>

    <div class="back-nav">←</div>
    
    <h1 class="page-header">MANAGE TOUR</h1>
    <h2 class="sub-header">CREATE/EDIT TOUR</h2>

    <form class="manage-container">
        <div class="col">
            <div class="input-group">
                <label>Price:</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
            <div class="input-group">
                <label>Duration:</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
            <div class="input-group">
                <label>Location:</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
        </div>

        <div class="col">
            <div class="input-group">
                <label>Tour name:</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
            <div class="input-group">
                <label>Tour Description:</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
            <div class="input-group">
                <label>Max Capacity :</label>
                <input type="text" class="input-field" placeholder="Enter..">
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-title">Upload images</div>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <div class="camera-icon">📷</div>
                <img id="imagePreview" alt="Preview">
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
        </div>
    </form>

    <script>
        // Logic to preview uploaded image
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('imagePreview');
        const cameraIcon = document.querySelector('.camera-icon');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    cameraIcon.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
