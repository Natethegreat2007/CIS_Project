<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Arial;
    background-image:url("jungle-bg.jpg");
    background-size:cover;
    color:white;
    height:100vh;
}

.logo{
    text-align:center;
    margin-top:40px;
}

.logo img{
    width:180px;
}

h1{
    font-family:'Luckiest Guy';
    font-size:70px;
    color:yellow;
    text-shadow:5px 5px black;
    text-align:center;
    margin-top:20px;
}

.login-box{
    width:500px;
    padding:50px;
    border-radius:30px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
}

.login-box input{
    width:90%;
    padding:20px;
    margin:20px 0;
    font-size:20px;
    border-radius:25px;
    border:none;
}

.forgot{
    font-size:16px;
    margin-top:-10px;
    cursor:pointer;
}

.go-btn{
    position:fixed;
    bottom:30px;
    left:30px;
    width:250px;
    height:80px;
    font-size:30px;
    font-family:'Luckiest Guy';
    background:yellow;
    color:green;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.go-btn:hover {
    background: darkyellow;
    transform: scale(1.1);
}

.register-btn{
    position:fixed;
    bottom:30px;
    right:30px;
    width:250px;
    height:80px;
    font-size:30px;
    font-family:'Luckiest Guy';
    background:yellow;
    color:green;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition: 0.3s;
}

.register-btn:hover {
    background: darkyellow;
    transform: scale(1.1);
}

</style>

<!--JavaScript validation -->
<script>
function validateForm(){

let email = document.forms["loginForm"]["email"].value;

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){
    alert("Please enter a valid email");
    return false;
}

return true;
}
</script>

</head>
<body>

<div class="logo">
    <img src="logo.png">
</div>

<h1>LOGIN</h1>

<div class="login-box">


<form name="loginForm" action="login.php" method="POST" onsubmit="return validateForm()">
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<div class="forgot">FORGOT PASSWORD?</div>
<button type="submit" class="go-btn">GO!</button>
</form>

</div>

<a href="register.html">
    <button class="register-btn">REGISTER</button>
</a>

</body>
</html>
