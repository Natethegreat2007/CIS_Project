<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Arial;
    background-image:url("../images/jungle-bg3.jpg");
    background-size:cover;
    color:white;
}

.top{
    padding:35px;
}

.logo{
    font-family:'Luckiest Guy';
    font-size:70px; 
    color:yellow;
    text-shadow:4px 4px black;
    display:inline-block;
}

.menu{
    display:inline-block;
    margin-left:120px; 
}

.menu a{
    font-family:'Luckiest Guy';
    color:yellow;
    text-decoration:none;
    margin:25px;
    font-size:32px;  
}

.search{
    float:right;
    margin-top:30px;
}

.search input{
    padding:14px;
    width:260px;  
    border-radius:25px;
    border:none;
    font-size:18px;
}

.title{
    font-family:'Luckiest Guy';
    color:yellow;
    font-size:45px; 
    margin-left:60px;
    margin-top:40px;
    text-shadow:3px 3px black;
}

.attractions{
    text-align:center;
    margin-top:30px;
}

.attractions img{
    width:450px; 
    height:280px;
    border:4px solid yellow;
    border-radius:20px;
    margin:35px;
    transition:0.3s;
}

.attractions img:hover{
    transform:scale(1.05);
}

.tours{
    text-align:center;
    margin-top:20px;
}

.tours img{
    width:230px; 
    height:230px;
    border-radius:120px;
    border:4px solid yellow;
    margin:35px;
    transition:0.3s;
}

.tours img:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="top">
    <div class="logo">HOME</div>

    <div class="menu">
        <a href="#">ATTRACTION</a>
        <a href="#">MYBOOKING</a>
    </div>

    <div class="search">
        <input type="text" placeholder="Search">
    </div>
</div>

<div class="title">TOP ATTRACTIONS:</div>

<div class="attractions">
    <img src="../images/maya-temple.jpg">
    <img src="../images/bluehole.jpg">
    <img src="../images/reef.jpg">
</div>

<div class="title">POPULAR TOURS:</div>

<div class="tours">
    <img src="../images/tour1.jpg">
    <img src="../images/tour2.jpg">
    <img src="../images/tour3.jpg">
    <img src="../images/tour4.jpg">
</div>

</body>
</html>
